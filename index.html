<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動管理看板</title>
    <style>
        /* --- 無印風格基礎設定 --- */
        html { scroll-behavior: smooth; scroll-padding-top: 20px; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            background-color: #F9F6F0; 
            color: #3A3A3A;            
            margin: 0;
            padding: 40px 20px 40px 180px; 
            line-height: 1.6;
            transition: padding 0.3s ease;
        }
        .container { max-width: 720px; margin: 0 auto; }
        h1 {
            font-size: 1.6rem;
            font-weight: 400;
            text-align: center;
            color: #2B2B2B;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        /* --- 固定式側邊欄 --- */
        .sidebar {
            position: fixed;
            top: 40px;
            left: 30px;
            width: 120px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .sidebar-title {
            font-size: 0.75rem;
            color: #A69E92;
            letter-spacing: 1px;
            margin-bottom: 4px;
            padding-left: 8px;
            text-transform: uppercase;
        }
        .sidebar-nav { display: flex; flex-direction: column; gap: 4px; }
        .sidebar-link {
            display: block;
            background: none;
            border: none;
            color: #8C8476;
            padding: 8px 12px;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .sidebar-link:hover { background: #F1ECE4; color: #3A3A3A; }
        .sidebar.hidden { display: none; }

        /* --- 分頁標籤 --- */
        .tabs {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #D1C9BC;
        }
        .tab-button {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            color: #8C8476;
            position: relative;
            bottom: -1px;
        }
        .tab-button.active {
            color: #2B2B2B;
            border-bottom: 2px solid #8C8476;
            font-weight: 500;
        }

        /* --- 輸入表單 --- */
        .form-section {
            background: #F1ECE4;
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 40px;
        }
        .form-section h3 { margin-top: 0; font-size: 1rem; color: #555; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; display: flex; flex-direction: column; }
        .form-group-row { display: flex; gap: 15px; }
        .form-group-row .form-group { flex: 1; }
        .radio-group { flex-direction: row; gap: 20px; align-items: center; padding: 5px 0; }
        .radio-label { display: flex; align-items: center; gap: 6px; font-size: 0.95rem; cursor: pointer; }
        label { font-size: 0.85rem; color: #6E756A; margin-bottom: 4px; }
        input, textarea {
            border: 1px solid #D1C9BC;
            background: #FFF;
            padding: 8px 12px;
            font-size: 0.9rem;
            border-radius: 2px;
            outline: none;
        }

        .submit-btn {
            background: #6E756A;
            color: white;
            border: none;
            padding: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 2px;
            width: 100%;
            margin-top: 10px;
        }
        .submit-btn:hover { background: #5B6257; }
        .submit-btn:disabled { background: #BDB6A8; cursor: not-allowed; }

        /* --- 區塊設定與顏色 --- */
        .page { display: none; }
        .page.active { display: block; }
        .section { margin-bottom: 40px; }
        .section-title {
            font-weight: 600;
            padding-bottom: 12px;
            border-bottom: 2px solid #D1C9BC;
            margin-bottom: 15px;
        }
        .category-title {
            font-size: 0.95rem;
            font-weight: 600;
            color: #8C8476;
            margin: 20px 0 5px 0;
        }
        
        #upcoming-section .section-title { font-size: 1.2rem; color: #5E6D7E; border-bottom-color: #DDE2E6; } 
        #ending-section .section-title { font-size: 1.2rem; color: #8C6B6B; border-bottom-color: #E6DDDD; } 
        #current-section {
            margin-bottom: 50px;
            background-color: #F4F1EA; 
            padding: 20px 15px;
            border-radius: 6px;
            border: 1px solid #E6DFD5;
        }
        #current-section .section-title { 
            font-size: 1.5rem; 
            color: #4A5644;    
            border-bottom: 2px solid #A2AE9C; 
        }

        /* --- 列表樣式 --- */
        ul { list-style: none; padding: 0; }
        li {
            padding: 18px 4px;
            border-bottom: 1px solid #E6DFD5; 
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .activity-name { font-size: 1rem; display: block; margin-bottom: 6px; font-weight: 500; }
        .detail-item { display: flex; font-size: 0.85rem; color: #8C8476; margin-bottom: 3px; }
        .detail-num { color: #BDB6A8; margin-right: 8px; }
        .activity-right { text-align: right; min-width: 140px; }
        .activity-date { font-size: 0.85rem; color: #8C8476; }
        
        .badge {
            background: #A94444; color: #FFF; padding: 2px 8px;
            border-radius: 2px; font-size: 0.75rem; margin-left: 8px;
        }
        .status-ending-today .activity-name { color: #A94444; }
        .empty-message { color: #A69E92; font-size: 0.85rem; padding: 10px 4px; font-style: italic; }

        @media (max-width: 900px) {
            body { padding-left: 20px; }
            .sidebar { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="看板側邊欄">
        <div class="sidebar-title">快速跳轉</div>
        <div class="sidebar-nav">
            <button class="sidebar-link" onclick="scrollToSection('upcoming-section')">↳ 將要開始</button>
            <button class="sidebar-link" onclick="scrollToSection('current-section')" style="color: #4A5644; font-weight: 500;">↳ 進行中</button>
            <button class="sidebar-link" onclick="scrollToSection('ending-section')">↳ 將要結束</button>
        </div>
    </div>

    <div class="container">
        <h1>活動動態管理</h1>

        <div class="form-section">
            <h3 id="form-title">新增活動資料</h3>
            <div class="form-group-row">
                <div class="form-group" style="flex: 2;">
                    <label>活動名稱</label>
                    <input type="text" id="input-name" placeholder="例如：秋季新品在地食材展">
                </div>
                <div class="form-group">
                    <label>活動類別</label>
                    <div class="radio-group">
                        <label class="radio-label"><input type="radio" name="input-type" value="食品" checked> 食品</label>
                        <label class="radio-label"><input type="radio" name="input-type" value="生雜"> 生雜</label>
                    </div>
                </div>
            </div>
            <div class="form-group-row">
                <div class="form-group"><label>開始時間</label><input type="date" id="input-start"></div>
                <div class="form-group"><label>結束時間</label><input type="date" id="input-end"></div>
            </div>
            <div class="form-group">
                <label>活動細項 (按換行輸入)</label>
                <textarea id="input-details" rows="3"></textarea>
            </div>
            <button class="submit-btn" id="btn-submit" onclick="saveActivity()">同步至雲端並新增</button>
        </div>

        <div class="tabs">
            <button class="tab-button active" id="tab-home" onclick="switchPage('home')">首頁看板</button>
            <button class="tab-button" id="tab-all" onclick="switchPage('all')">所有活動查詢</button>
        </div>

        <div id="page-home" class="page active">
            <div id="upcoming-section" class="section">
                <h2 class="section-title">本週即將開始</h2>
                <div class="category-title">［ 食品 ］</div><ul id="up-food"></ul>
                <div class="category-title">［ 生雜 ］</div><ul id="up-goods"></ul>
            </div>
            <div id="current-section" class="section">
                <h2 class="section-title">進行中</h2>
                <div class="category-title">［ 食品 ］</div><ul id="cur-food"></ul>
                <div class="category-title">［ 生雜 ］</div><ul id="cur-goods"></ul>
            </div>
            <div id="ending-section" class="section">
                <h2 class="section-title">本週即將結束</h2>
                <div class="category-title">［ 食品 ］</div><ul id="end-food"></ul>
                <div class="category-title">［ 生雜 ］</div><ul id="end-goods"></ul>
            </div>
        </div>

        <div id="page-all" class="page">
            <div id="all-section" class="section">
                <h2 class="section-title">歷年及未來所有活動</h2>
                <ul id="all-list"></ul>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ 務必替換為你的 Google Apps Script 最新部署網址
        const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycby25up1TY0XRYjagu85Bw5yAJmdYh_pLsszJRTF1TOssL0QFAN4ClPWNxPXr34uM-c/exec"; 
        let activities = [];

        window.onload = fetchFromGoogle;

        async function fetchFromGoogle() {
            try {
                // 加上時間戳記防快取
                const response = await fetch(GOOGLE_API_URL + "?t=" + new Date().getTime());
                const data = await response.json();
                activities = data;
                renderAll();
            } catch (e) {
                console.error("無法從雲端讀取資料：", e);
            }
        }

        function saveActivity() {
            const name = document.getElementById('input-name').value;
            const type = document.querySelector('input[name="input-type"]:checked').value;
            const start = document.getElementById('input-start').value;
            const end = document.getElementById('input-end').value;
            const details = document.getElementById('input-details').value;

            if (!name || !start || !end) { alert('請填寫完整'); return; }

            const xhr = new XMLHttpRequest();
            xhr.open("POST", GOOGLE_API_URL, true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");

            // 拼裝字串
            const data = "name=" + encodeURIComponent(name) +
                        "&type=" + encodeURIComponent(type) +
                        "&startDate=" + encodeURIComponent(start) +
                        "&endDate=" + encodeURIComponent(end) +
                        "&details=" + encodeURIComponent(details);

            xhr.onreadystatechange = function() {
                // 因為 GAS 跨域問題，這裡可能不會回傳 200，但資料通常已經進去了
                if (xhr.readyState === 4) {
                    alert("發送動作已完成，請檢查試算表！");
                    location.reload();
                }
            };

            xhr.send(data);
        }

        function renderAll() {
            const today = new Date(); today.setHours(0,0,0,0);
            
            // 計算本週範圍 (週一到週日)
            const currentDay = today.getDay();
            const distToMon = currentDay === 0 ? -6 : 1 - currentDay;
            const monday = new Date(today); monday.setDate(today.getDate() + distToMon);
            const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6); sunday.setHours(23,59,59);

            const lists = {
                upFood: document.getElementById('up-food'), upGoods: document.getElementById('up-goods'),
                curFood: document.getElementById('cur-food'), curGoods: document.getElementById('cur-goods'),
                endFood: document.getElementById('end-food'), endGoods: document.getElementById('end-goods'),
                all: document.getElementById('all-list')
            };

            Object.values(lists).forEach(l => l.innerHTML = '');

            activities.forEach(act => {
                // 重要：處理日期格式相容性 (將 / 轉為 -)
                const sDateStr = act.startDate ? act.startDate.toString().replace(/\//g, '-') : "";
                const eDateStr = act.endDate ? act.endDate.toString().replace(/\//g, '-') : "";
                
                const sDate = new Date(sDateStr); sDate.setHours(0,0,0,0);
                const eDate = new Date(eDateStr); eDate.setHours(0,0,0,0);
                
                if (isNaN(sDate.getTime()) || isNaN(eDate.getTime())) return;

                const isCurrent = (today >= sDate && today <= eDate);
                const isEndingToday = (today.getTime() === eDate.getTime());
                const isUpcomingThisWeek = (sDate > today && sDate <= sunday);
                const isEndingThisWeek = (isCurrent && eDate <= sunday);

                const detailItems = act.details ? act.details.split('\n').filter(t => t.trim()).map((t, i) => 
                    `<div class="detail-item"><span class="detail-num">${(i+1).toString().padStart(2,'0')}.</span>${t}</div>`).join('') : '';

                const li = document.createElement('li');
                if (isEndingToday) li.className = 'status-ending-today';

                li.innerHTML = `
                    <div class="activity-info">
                        <span class="activity-name">${act.name}${isEndingToday ? '<span class="badge">本日終了</span>' : ''}</span>
                        ${detailItems}
                    </div>
                    <div class="activity-right">
                        <span class="activity-date" style="${isEndingToday ? 'color:#A94444; font-weight:bold;' : ''}">
                            ${isUpcomingThisWeek ? sDateStr + ' 開跑' : sDateStr + ' ~ ' + eDateStr}
                        </span>
                    </div>
                `;

                // 渲染至所有查詢
                lists.all.appendChild(li.cloneNode(true));

                // 渲染至首頁分類
                const category = (act.type === '食品' || act.type === 'food') ? 'Food' : 'Goods';
                
                if (isEndingThisWeek) {
                    lists['end' + category].appendChild(li);
                } else if (isCurrent) {
                    lists['cur' + category].appendChild(li);
                } else if (isUpcomingThisWeek) {
                    lists['up' + category].appendChild(li);
                }
            });

            // 空白檢查顯示訊息
            ["upFood","upGoods","curFood","curGoods","endFood","endGoods"].forEach(k => {
                if(!document.getElementById(k.replace(/[A-Z]/, s => '-' + s.toLowerCase())).innerHTML) {
                    document.getElementById(k.replace(/[A-Z]/, s => '-' + s.toLowerCase())).innerHTML = '<div class="empty-message">目前無相關活動</div>';
                }
            });
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('tab-' + p).classList.add('active');
            document.getElementById('看板側邊欄').className = (p === 'home' ? 'sidebar' : 'sidebar hidden');
        }

        function scrollToSection(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }
    </script>
</body>
</html>
