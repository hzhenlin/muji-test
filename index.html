<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動排程看板 | MUJI Style</title>
    <style>
        :root {
            --muji-red: #7F0019;
            --muji-beige: #F4F1EA;
            --muji-gray: #666666;
            --muji-dark: #333333;
            --muji-border: #E0DCD2;
        }

        body {
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--muji-beige);
            color: var(--muji-dark);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            border-bottom: 2px solid var(--muji-dark);
            padding-bottom: 10px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        /* 表單區域 */
        .input-card {
            background: #fff;
            padding: 25px;
            margin-bottom: 40px;
            border: 1px solid var(--muji-border);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 12px;
            color: var(--muji-gray);
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            border: 1px solid var(--muji-border);
            padding: 10px;
            font-size: 14px;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--muji-dark);
        }

        .radio-group {
            display: flex;
            gap: 15px;
            padding: 10px 0;
        }

        .btn-submit {
            background-color: var(--muji-dark);
            color: #fff;
            border: none;
            padding: 12px 25px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
            width: 100%;
        }

        .btn-submit:hover {
            background-color: var(--muji-red);
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        /* 看板區域 */
        .board-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .column {
            background-color: rgba(255,255,255,0.5);
            padding: 15px;
            min-height: 400px;
            border-top: 4px solid var(--muji-dark);
        }

        .column h2 {
            font-size: 16px;
            text-align: center;
            margin-bottom: 20px;
            color: var(--muji-gray);
        }

        .card {
            background: #fff;
            border: 1px solid var(--muji-border);
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .card-tag {
            font-size: 10px;
            display: inline-block;
            padding: 2px 6px;
            border: 1px solid var(--muji-gray);
            margin-bottom: 10px;
        }

        .card-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .card-date {
            font-size: 12px;
            color: var(--muji-gray);
        }

        .card-details {
            font-size: 13px;
            margin-top: 10px;
            color: #444;
            border-top: 1px dashed var(--muji-border);
            padding-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>活動排程管理</h1>
        <span id="current-time" style="font-size: 12px; color: var(--muji-gray);"></span>
    </header>

    <!-- 輸入區域 -->
    <div class="input-card">
        <div class="form-grid">
            <div class="form-group">
                <label>活動名稱</label>
                <input type="text" id="input-name" placeholder="輸入活動名稱...">
            </div>
            <div class="form-group">
                <label>活動類別</label>
                <div class="radio-group">
                    <label style="display:inline; font-weight:normal;"><input type="radio" name="input-type" value="食品" checked> 食品</label>
                    <label style="display:inline; font-weight:normal;"><input type="radio" name="input-type" value="生雜"> 生雜</label>
                </div>
            </div>
            <div class="form-group">
                <label>開始日期</label>
                <input type="date" id="input-start">
            </div>
            <div class="form-group">
                <label>結束日期</label>
                <input type="date" id="input-end">
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 20px;">
            <label>細項備註</label>
            <textarea id="input-details" rows="2" placeholder="輸入活動相關細項..."></textarea>
        </div>
        <button class="btn-submit" id="btn-submit" onclick="saveActivity()">同步至雲端並新增活動</button>
    </div>

    <!-- 看板區域 -->
    <div class="board-section">
        <div class="column" id="col-pending"><h2>尚未開始</h2></div>
        <div class="column" id="col-active"><h2>進行中</h2></div>
        <div class="column" id="col-finished"><h2>已結束</h2></div>
    </div>
</div>

<script>
    // ⚠️ 這裡請換成你最新的 GAS 網址
    const GOOGLE_API_URL = "https://script.google.com/macros/s/AKfycby25up1TY0XRYjagu85Bw5yAJmdYh_pLsszJRTF1TOssL0QFAN4ClPWNxPXr34uM-c/exec";

    let activities = [];

    // 初始化：從試算表讀取資料
    window.onload = function() {
        document.getElementById('current-time').innerText = "Last update: " + new Date().toLocaleString();
        fetchData();
    };

    // 讀取資料 (GET)ㄓ
    async function fetchData() {
        try {
            const resp = await fetch(GOOGLE_API_URL + "?t=" + new Date().getTime());
            const data = await resp.json();
            activities = data;
            renderBoard();
        } catch (e) {
            console.error("讀取失敗:", e);
        }
    }

    // 寫入資料 (POST)
    function saveActivity() {
        const name = document.getElementById('input-name').value;
        const type = document.querySelector('input[name="input-type"]:checked').value;
        const start = document.getElementById('input-start').value;
        const end = document.getElementById('input-end').value;
        const details = document.getElementById('input-details').value;

        if (!name || !start || !end) { alert('請填寫完整資訊'); return; }

        const btn = document.getElementById('btn-submit');
        btn.disabled = true;
        btn.innerText = "正在傳送至雲端...";

        // --- 建立隱藏表單 ---
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = GOOGLE_API_URL;
        form.target = 'hidden_iframe'; // 避免頁面跳轉

        const data = {
            name: name,
            type: type,
            startDate: start,
            endDate: end,
            details: details
        };

        // 將資料塞入表單
        for (let key in data) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = key;
            input.value = data[key];
            form.appendChild(input);
        }

        // 建立一個隱藏的 iframe 用來接收 Google 的回應
        let iframe = document.getElementById('hidden_iframe');
        if (!iframe) {
            iframe = document.createElement('iframe');
            iframe.id = 'hidden_iframe';
            iframe.name = 'hidden_iframe';
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
        }

        document.body.appendChild(form);
        form.submit(); // 發送

        // 延遲重整頁面
        setTimeout(() => {
            alert('同步動作已執行！請檢查試算表。');
            document.body.removeChild(form);
            location.reload();
        }, 2000);
    }
    // 渲染看板
    function renderBoard() {
        const cols = {
            '尚未開始': document.getElementById('col-pending'),
            '進行中': document.getElementById('col-active'),
            '已結束': document.getElementById('col-finished')
        };

        // 清空舊內容 (保留標題)
        Object.values(cols).forEach(c => {
            const h2 = c.querySelector('h2');
            c.innerHTML = '';
            c.appendChild(h2);
        });

        activities.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-tag">${item.type}</div>
                <div class="card-title">${item.name}</div>
                <div class="card-date">${item.startDate} ~ ${item.endDate}</div>
                <div class="card-details">${item.details || '無細項備註'}</div>
            `;
            
            if(cols[item.state]) {
                cols[item.state].appendChild(card);
            }
        });
    }
</script>

</body>
</html>
